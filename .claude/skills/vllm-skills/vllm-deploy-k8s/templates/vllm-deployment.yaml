apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  labels:
    app: vllm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm
  template:
    metadata:
      labels:
        app: vllm
    spec:
      containers:
      - name: vllm
        image: vllm/vllm-openai:latest
        command: ["/bin/sh", "-c"]
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          runAsNonRoot: false
        args:
        - |
          vllm serve Qwen/Qwen2.5-1.5B-Instruct \
            --tensor-parallel-size 1 \
            --enable-chunked-prefill \
            --gpu-memory-utilization 0.85
        env:
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-token
              key: HF_TOKEN
              optional: true
        - name: HF_HOME
          value: /root/.cache/huggingface
        - name: VLLM_LOGGING_LEVEL
          value: "INFO"
        ports:
        - containerPort: 8000
        resources:
          limits:
            cpu: "128"
            memory: 400Gi
            nvidia.com/gpu: "1"
          requests:
            cpu: "12"
            memory: 100Gi
            nvidia.com/gpu: "1"
        volumeMounts:
        - mountPath: /dev/shm
          name: dshm
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 120
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 120
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 30
      volumes:
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 80Gi
